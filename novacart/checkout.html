<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | NovaCart</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .checkout-layout {
            margin-top: 100px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        .checkout-section {
            background-color: var(--color-card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .checkout-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .checkout-title .step-num {
            width: 30px;
            height: 30px;
            background-color: var(--color-primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .payment-method {
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
        }

        .payment-method.active {
            border-color: var(--color-primary);
            background-color: rgba(37, 99, 235, 0.05);
        }

        .payment-method input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .pm-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 500;
        }

        .pm-header i {
            font-size: 1.5rem;
            color: var(--color-text-secondary);
        }

        .payment-method.active .pm-header i {
            color: var(--color-primary);
        }

        .pm-details {
            display: none;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--color-border);
        }

        .payment-method.active .pm-details {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* Order Summary matches Cart layout slightly modified */
        .summary-container {
            background-color: var(--color-card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            padding: 2rem;
            position: sticky;
            top: 100px;
        }

        .summary-title {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--color-border);
        }

        .checkout-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .checkout-item-name {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: var(--color-text-secondary);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--color-text-secondary);
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--color-border);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-text-primary);
        }

        @media (max-width: 1024px) {
            .checkout-layout {
                grid-template-columns: 1fr;
            }
            .summary-container {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-shopping-bag"></i> Nova<span>Cart</span>
            </a>
            
            <div class="nav-menu">
                <ul class="nav-links">
                    <li><a href="cart.html" style="color: var(--color-text-secondary);"><i class="fas fa-arrow-left"></i> Back to Cart</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container section">
        <h1 style="font-size: 2rem; margin-bottom: 2rem; margin-top: 2rem;">Checkout</h1>

        <form id="checkoutForm" class="checkout-layout" onsubmit="event.preventDefault(); handlePlaceOrder();">
            
            <div class="checkout-main">
                <!-- Shipping Info -->
                <div class="checkout-section animate-slide-up">
                    <h2 class="checkout-title"><span class="step-num">1</span> Shipping Information</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" required placeholder="John">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" required placeholder="Doe">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" required placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" required placeholder="+1 234 567 8900">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Street Address</label>
                        <input type="text" class="form-control" required placeholder="123 Main St, Apt 4B">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" required placeholder="New York">
                        </div>
                        <div class="form-group">
                            <label class="form-label">State / Province</label>
                            <input type="text" class="form-control" required placeholder="NY">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Country</label>
                            <select class="form-control" required>
                                <option value="">Select Country</option>
                                <option value="US">United States</option>
                                <option value="UK">United Kingdom</option>
                                <option value="CA">Canada</option>
                                <option value="AU">Australia</option>
                                <option value="IN">India</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Postal / Zip Code</label>
                            <input type="text" class="form-control" required placeholder="10001">
                        </div>
                    </div>
                </div>

                <!-- Payment Method -->
                <div class="checkout-section animate-slide-up" style="animation-delay: 0.1s;">
                    <h2 class="checkout-title"><span class="step-num">2</span> Payment Method</h2>
                    
                    <div class="payment-methods">
                        
                        <label class="payment-method active" onclick="selectPaymentMethod(this)">
                            <input type="radio" name="payment" value="credit_card" checked>
                            <div class="pm-header">
                                <i class="far fa-credit-card"></i> Credit / Debit Card
                            </div>
                            <div class="pm-details">
                                <div class="form-group">
                                    <label class="form-label">Card Number</label>
                                    <input type="text" class="form-control" placeholder="0000 0000 0000 0000">
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label">Expiry Date</label>
                                        <input type="text" class="form-control" placeholder="MM/YY">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">CVV</label>
                                        <input type="text" class="form-control" placeholder="123">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Name on Card</label>
                                    <input type="text" class="form-control" placeholder="John Doe">
                                </div>
                            </div>
                        </label>

                        <label class="payment-method" onclick="selectPaymentMethod(this)">
                            <input type="radio" name="payment" value="upi">
                            <div class="pm-header">
                                <i class="fas fa-mobile-alt"></i> UPI / Wallet
                            </div>
                            <div class="pm-details">
                                <div class="form-group">
                                    <label class="form-label">Enter UPI ID</label>
                                    <input type="text" class="form-control" placeholder="username@upi">
                                </div>
                                <p style="font-size: 0.9rem; color: var(--color-text-secondary); margin-top: 0.5rem;">A payment request will be sent to your UPI app.</p>
                            </div>
                        </label>

                        <label class="payment-method" onclick="selectPaymentMethod(this)">
                            <input type="radio" name="payment" value="net_banking">
                            <div class="pm-header">
                                <i class="fas fa-university"></i> Net Banking
                            </div>
                            <div class="pm-details">
                                <div class="form-group">
                                    <label class="form-label">Select Bank</label>
                                    <select class="form-control">
                                        <option value="">Choose your bank</option>
                                        <option value="chase">Chase Bank</option>
                                        <option value="bofa">Bank of America</option>
                                        <option value="wells">Wells Fargo</option>
                                        <option value="citi">Citibank</option>
                                    </select>
                                </div>
                            </div>
                        </label>

                        <label class="payment-method" onclick="selectPaymentMethod(this)">
                            <input type="radio" name="payment" value="cod">
                            <div class="pm-header">
                                <i class="fas fa-money-bill-wave"></i> Cash On Delivery (COD)
                            </div>
                            <div class="pm-details">
                                <p style="font-size: 0.9rem; color: var(--color-text-secondary);">Pay in cash when your order is delivered to your doorstep.</p>
                            </div>
                        </label>

                    </div>
                </div>
            </div>

            <!-- Summary Sidebar -->
            <div class="summary-container animate-slide-up" style="animation-delay: 0.2s;">
                <h2 class="summary-title">Order Summary</h2>
                
                <div id="checkoutItemsList" style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--color-border); padding-bottom: 1rem;">
                    <!-- Items injected here -->
                </div>

                <div id="checkoutTotals">
                    <!-- Totals injected here -->
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.25rem; font-size: 1.1rem; margin-top: 2rem;">
                    Place Order <i class="fas fa-check-circle" style="margin-left: 0.5rem;"></i>
                </button>
                
                <p style="text-align: center; font-size: 0.85rem; color: var(--color-text-secondary); margin-top: 1rem;">
                    By placing this order, you agree to our Terms of Service and Privacy Policy.
                </p>
            </div>
            
        </form>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top: none; padding-top: 0;">
                <p>&copy; 2026 NovaCart. Secure Checkout.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="assets/js/products.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/cart.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/auth.js"></script>
    
    <script>
        firebase.auth().onAuthStateChanged(async (user) => {
            if (!user) {
                showToast('Please login to place an order', 'error');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                return;
            }

            const cartItems = await getCartData();
            if (cartItems.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            renderOrderSummary(cartItems);
            
            // Auto-fill form if logged in
            const inputs = document.querySelectorAll('input[type="email"]');
            if(inputs.length > 0) inputs[0].value = user.email;
            
            const fName = document.querySelectorAll('input[type="text"]')[0];
            const lName = document.querySelectorAll('input[type="text"]')[1];
            if(user.displayName) {
                const parts = user.displayName.split(' ');
                fName.value = parts[0] || '';
                lName.value = parts.slice(1).join(' ') || '';
            } else {
                // If displayName is not available, maybe fetch from Firestore
                db.collection('users').doc(user.uid).get().then(doc => {
                    if (doc.exists && doc.data().name) {
                        const parts = doc.data().name.split(' ');
                        fName.value = parts[0] || '';
                        lName.value = parts.slice(1).join(' ') || '';
                    }
                });
            }
        });

        function selectPaymentMethod(element) {
            document.querySelectorAll('.payment-method').forEach(pm => pm.classList.remove('active'));
            element.classList.add('active');
            element.querySelector('input[type="radio"]').checked = true;
        }

        function renderOrderSummary(cartItems) {
            const itemsList = document.getElementById('checkoutItemsList');
            const totalsContainer = document.getElementById('checkoutTotals');
            const summaryData = JSON.parse(localStorage.getItem('novacart_summary'));

            if (!summaryData) {
                window.location.href = 'cart.html';
                return;
            }

            itemsList.innerHTML = cartItems.map(item => {
                const product = products.find(p => p.id === item.id);
                if(!product) return '';
                const discountedPrice = calculateDiscount(product.price, product.discount);
                return `
                    <div class="checkout-item">
                        <div style="display: flex; align-items: center; gap: 0.5rem; max-width: 70%;">
                            <span style="font-weight: 600;">${item.quantity}x</span>
                            <span class="checkout-item-name">${product.name}</span>
                        </div>
                        <span style="font-weight: 500;">${formatPrice(discountedPrice * item.quantity)}</span>
                    </div>
                `;
            }).join('');

            totalsContainer.innerHTML = `
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span style="font-weight: 500; color: var(--color-text-primary);">${formatPrice(summaryData.subtotal)}</span>
                </div>
                
                <div class="summary-row">
                    <span>Tax</span>
                    <span style="font-weight: 500; color: var(--color-text-primary);">${formatPrice(summaryData.tax)}</span>
                </div>
                
                <div class="summary-row">
                    <span>Shipping</span>
                    <span style="font-weight: 500; color: var(--color-text-primary);">${summaryData.shipping === 0 ? 'Free' : formatPrice(summaryData.shipping)}</span>
                </div>

                ${summaryData.discountAmt > 0 ? `
                <div class="summary-row" style="color: var(--color-danger);">
                    <span>Discount Applied</span>
                    <span style="font-weight: 500;">-${formatPrice(summaryData.discountAmt)}</span>
                </div>
                ` : ''}

                <div class="summary-total">
                    <span>Grand Total</span>
                    <span style="color: var(--color-primary);">${formatPrice(summaryData.grandTotal)}</span>
                </div>
            `;
        }

        async function handlePlaceOrder() {
            const user = firebase.auth().currentUser;
            if (!user) {
                showToast('Please login to place an order', 'error');
                return;
            }

            // Show loading state
            const btn = document.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            try {
                // Generate Order ID
                const orderId = 'ORD-' + Math.floor(100000 + Math.random() * 900000);
                
                // Get cart from Firebase
                const cartItems = await getCartData();
                const summaryData = JSON.parse(localStorage.getItem('novacart_summary')) || { grandTotal: 0 };
                
                // Get payment method
                const pmInput = document.querySelector('input[name="payment"]:checked');
                const paymentMethod = pmInput ? pmInput.value : 'credit_card';

                const newOrder = {
                    id: orderId,
                    userId: user.uid,
                    date: new Date().toISOString(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    items: cartItems,
                    total: summaryData.grandTotal,
                    paymentMethod: paymentMethod,
                    status: 'Processing'
                };

                // Save to Firestore 'orders' collection
                await db.collection('orders').add(newOrder);

                // Clear Firebase cart
                await db.collection('users').doc(user.uid).update({
                    cart: []
                });

                // Clear local storage fallbacks
                localStorage.removeItem(CART_KEY);
                localStorage.removeItem('novacart_summary');
                updateCartCounters();

                showToast('Order placed successfully!');
                
                // Redirect to orders page
                setTimeout(() => {
                    window.location.href = 'orders.html';
                }, 1500);

            } catch (error) {
                console.error("Error placing order:", error);
                showToast("Failed to place order. Try again.", 'error');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
    <button id="backToTop" class="btn-icon" title="Back to Top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" style="position: fixed; bottom: 2rem; right: 2rem; z-index: 99; display: none; background: var(--color-primary); color: white; box-shadow: var(--shadow-lg);">
        <i class="fas fa-arrow-up"></i>
    </button>
</body>
</html>
