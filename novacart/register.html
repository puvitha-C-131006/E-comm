<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | NovaCart</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--color-bg);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .auth-bg-shape {
            position: absolute;
            width: 800px;
            height: 800px;
            background-color: var(--color-primary);
            border-radius: 50%;
            top: -400px;
            right: -400px;
            opacity: 0.05;
            z-index: 0;
        }

        .auth-bg-shape-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            background-color: var(--color-accent);
            border-radius: 50%;
            bottom: -300px;
            left: -300px;
            opacity: 0.05;
            z-index: 0;
        }

        .auth-card {
            background-color: var(--color-card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            padding: 3rem;
            position: relative;
            z-index: 1;
            border: 1px solid var(--color-border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .logo {
            justify-content: center;
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        .auth-header h1 {
            font-size: 1.5rem;
            color: var(--color-text-primary);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--color-text-secondary);
        }

        .auth-form .form-group {
            margin-bottom: 1.25rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .password-input-group {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-secondary);
            cursor: pointer;
        }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        .terms-checkbox input {
            margin-top: 0.2rem;
            accent-color: var(--color-primary);
        }

        .terms-checkbox a {
            color: var(--color-primary);
            font-weight: 500;
        }

        .terms-checkbox a:hover {
            text-decoration: underline;
        }

        .btn-auth {
            width: 100%;
            padding: 0.875rem;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--color-text-secondary);
            margin-bottom: 1.5rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--color-border);
        }

        .auth-divider span {
            padding: 0 1rem;
            font-size: 0.9rem;
        }

        .btn-google {
            width: 100%;
            background-color: var(--color-card-bg);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-weight: 500;
        }

        .btn-google:hover {
            background-color: #f8fafc;
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .btn-google img {
            width: 20px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--color-text-secondary);
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: var(--color-primary);
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-bg-shape"></div>
        <div class="auth-bg-shape-2"></div>

        <div class="auth-card animate-slide-up">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <i class="fas fa-shopping-bag"></i> Nova<span>Cart</span>
                </a>
                <h1>Create an Account</h1>
                <p>Join us and start shopping premium products</p>
            </div>

            <form class="auth-form" onsubmit="event.preventDefault(); handleRegister();">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="regName" class="form-control" required placeholder="John Doe">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="regEmail" class="form-control" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" id="regPhone" class="form-control" required placeholder="+1 234 567 8900">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="password-input-group">
                            <input type="password" id="regPassword" class="form-control" required placeholder="••••••••">
                            <i class="fas fa-eye password-toggle" onclick="toggleVisibility('regPassword', this)"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="password-input-group">
                            <input type="password" id="regConfirmPassword" class="form-control" required placeholder="••••••••">
                            <i class="fas fa-eye password-toggle" onclick="toggleVisibility('regConfirmPassword', this)"></i>
                        </div>
                    </div>
                </div>

                <label class="terms-checkbox">
                    <input type="checkbox" id="regTerms" required>
                    <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</span>
                </label>

                <button type="submit" class="btn btn-primary btn-auth" id="regBtn">Create Account</button>
            </form>

            <div class="auth-divider">
                <span>OR</span>
            </div>

            <button class="btn btn-google btn-auth" type="button" onclick="loginWithGoogle()">
                <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                  <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                  <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                  <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                  <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Sign up with Google
            </button>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/app.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/auth.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (user) {
                window.location.href = 'index.html';
            }
        });

        function toggleVisibility(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                iconElement.classList.remove('fa-eye');
                iconElement.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                iconElement.classList.remove('fa-eye-slash');
                iconElement.classList.add('fa-eye');
            }
        }

        async function handleRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const terms = document.getElementById('regTerms').checked;
            const btn = document.getElementById('regBtn');

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            btn.disabled = true;

            const success = await register(name, email, phone, password);
            if(!success) {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
    <button id="backToTop" class="btn-icon" title="Back to Top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" style="position: fixed; bottom: 2rem; right: 2rem; z-index: 99; display: none; background: var(--color-primary); color: white; box-shadow: var(--shadow-lg);">
        <i class="fas fa-arrow-up"></i>
    </button>
</body>
</html>
